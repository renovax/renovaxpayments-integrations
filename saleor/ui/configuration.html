<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RENOVAX Payments — Configuration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --bs-primary: #ff6a00; }
    .rnx-brand { color: var(--bs-primary); font-weight: 700; }
    .rnx-logo  { width: 28px; height: 28px; }
    body { background: #f8f9fa; }
    .card { max-width: 640px; margin: 2rem auto; }
  </style>
</head>
<body>
  <div class="card shadow-sm">
    <div class="card-header bg-white d-flex align-items-center gap-2">
      <img src="/static/rnx-logo.png" alt="" class="rnx-logo" onerror="this.style.display='none'">
      <h5 class="mb-0"><span class="rnx-brand">RENOVAX Payments</span> — Configuration</h5>
    </div>
    <div class="card-body">
      <div id="alert" class="alert d-none" role="alert"></div>

      <p class="text-muted small">
        <i class="bi bi-info-circle"></i>
        Paste your RENOVAX merchant credentials below. Find them at
        <a href="https://payments.renovax.net" target="_blank" rel="noopener">payments.renovax.net</a>
        → Merchants → (your merchant) → Edit → API Tokens.
      </p>

      <form id="cfg-form" class="vstack gap-3">
        <div>
          <label class="form-label">RENOVAX API base</label>
          <input type="url" class="form-control" name="renovaxApiBase" value="https://payments.renovax.net">
        </div>
        <div>
          <label class="form-label">Bearer token <span class="text-danger">*</span></label>
          <input type="password" class="form-control" name="renovaxBearerToken" placeholder="rnx_live_..." required>
        </div>
        <div>
          <label class="form-label">Webhook secret <span class="text-danger">*</span></label>
          <input type="password" class="form-control" name="renovaxWebhookSecret" placeholder="whsec_..." required>
          <div class="form-text">Used to verify HMAC of incoming RENOVAX webhooks.</div>
        </div>
        <div class="alert alert-info small">
          <i class="bi bi-link-45deg"></i>
          Set this URL as your RENOVAX webhook target:
          <code id="webhook-url">—</code>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check2-circle"></i> Verify and save
          </button>
        </div>
      </form>
    </div>
  </div>
  <script src="/configuration.js"></script>
</body>
</html>
